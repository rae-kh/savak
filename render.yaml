# render.yaml
# ───────────────────────────────────────────────────────────────────────────
# Render.com deployment configuration for the Savak TiTiler server.
#
# HOW TO DEPLOY:
#   1. Push this entire savak-gis folder to a GitHub repository
#   2. Go to https://render.com → New → Web Service
#   3. Connect your GitHub repo
#   4. Render will detect this file and configure everything automatically
#   5. Click Deploy — you'll get a URL like https://savak-titiler.onrender.com
#   6. Paste that URL into js/config.js → TITILER_URL
#
# FREE TIER NOTE:
#   Render's free tier spins down after 15 minutes of inactivity.
#   The first tile request after a sleep takes ~30 seconds.
#   To avoid this, upgrade to the $7/month Starter plan, or add a free
#   uptime monitor (e.g. UptimeRobot) that pings /health every 10 minutes.
# ───────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: savak-titiler
    runtime: python
    rootDir: titiler
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      # Replace with your actual frontend domain before going to production.
      # Multiple domains: "https://savak.resourcesfuture.com,https://www.savak.pk"
      - key: ALLOWED_ORIGINS
        value: "*"

      # GDAL env vars — these improve performance when reading from R2 / HTTP
      - key: GDAL_DISABLE_READDIR_ON_OPEN
        value: EMPTY_DIR
      - key: CPL_VSIL_CURL_ALLOWED_EXTENSIONS
        value: .tif,.tiff
      - key: VSI_CACHE
        value: "TRUE"
      - key: VSI_CACHE_SIZE
        value: "5000000"
